[build]
  command = "pnpm run build:clients"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  NODE_VERSION = "20"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# Backend API is on Render. Set VITE_API_URL in Netlify env so the frontend calls it.

# Proxy only static course assets (e.g. /courses/construction/file.pdf) to the backend.
# SPA routes like /, /courses, /courses/construction, /about, /contact, /terms, /privacy, /cookies,
# /register, /login, /dashboard, /admin, etc. must NOT be proxied — they are served by the fallback below.
[[redirects]]
  from = "/courses/:sector/:file"
  to = "https://ksohtc-platform.onrender.com/courses/:sector/:file"
  status = 200
  force = true

# SPA fallback: serve index.html for every path so all app routes work (direct URL, refresh, bookmark).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
