[build]
  command = "pnpm run build:clients"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  NODE_VERSION = "20"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# Backend API is on Render. Set VITE_API_URL in Netlify env (e.g. https://ksohtc-api.onrender.com) so the frontend calls it.

# SPA fallback: all other routes serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
